name: CI

# The repo is installed locally via the pnpm workspace at the parent js/
# directory, which lives outside this repository — so CI installs fresh
# (no lockfile) with pnpm in each package.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format:
    name: Lint & Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install && pnpm install --dir api

      - name: Lint (frontend + API)
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

  typecheck-build:
    name: Type check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install && pnpm install --dir api

      - name: Type check (frontend)
        run: npx tsc --noEmit

      - name: Build (Next.js)
        run: pnpm run build

  api-test:
    name: API type check & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install && pnpm install --dir api

      - name: Type check (API)
        run: cd api && npx tsc --noEmit

      # Unit tests are pure functions (engine math, adapters, validation)
      # and need no database.
      - name: API unit tests
        run: cd api && npx vitest run tests/unit
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
          SUPABASE_SECRET_KEY: ci-placeholder

      # Integration tests require a Supabase database. To enable them,
      # provision a test instance and set the secrets below, then run
      # `npx vitest run tests/integration`.
